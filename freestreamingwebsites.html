    <style>
        :root {
            color-scheme: dark;
            --bg-color: #1a1a1a;
            --card-bg: #2c2e2f;
            --text-color: #e0e0e0;
            --text-muted: #888;
            --accent-color: #4a9eff;
            --sidebar-bg: #242526;
            --hover-bg: #3a3c3d;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            overflow-x: hidden; /* 根源修复：禁止横向滚动 */
            background-color: var(--bg-color);
            color: var(--text-color);
            forced-color-adjust: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .page-container,
        .sidebar,
        .sidebar-header,
        .sidebar-menu,
        .sidebar-menu li,
        .sidebar-menu li a,
        .main-content,
        .section-header,
        .site-card,
        .site-card a,
        .footer {
            forced-color-adjust: none;
        }

        .page-container {
            display: flex;
            min-height: 100vh;
            /* 确保 flex 容器本身不会撑出视口 */
            width: 100%;
            max-width: 100vw;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            border-right: 1px solid #333;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #333;
            text-align: center;
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--accent-color);
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar-menu li a {
            display: block;
            padding: 12px 20px;
            color: var(--text-color);
            text-decoration: none;
            border-left: 3px solid transparent;
            transition: background-color 0.08s linear, color 0.08s linear;
            will-change: background-color, color;
        }

        .sidebar-menu li a:hover,
        .sidebar-menu li a.active {
            background-color: var(--hover-bg);
            border-left-color: var(--accent-color);
            color: var(--accent-color);
        }

        .sidebar-menu li a i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            /* 关键：flex:1 + min-width:0 防止内容撑破容器 */
            flex: 1 1 0;
            min-width: 0;
            /* 用 calc 明确宽度，不超出视口剩余区域 */
            width: calc(100% - 260px);
            max-width: calc(100vw - 260px);
            padding: 20px 30px;
            min-height: 100vh;
            /* 防止内部绝对/固定元素撑出容器 */
            overflow-x: hidden;
        }

        /* Section Header */
        .section-header {
            display: flex;
            align-items: center;
            margin: 30px 0 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #444;
        }

        .section-header i {
            margin-right: 10px;
            color: var(--accent-color);
        }

        .section-header h4 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        /* Card Styles */
        .site-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            margin-bottom: 15px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .site-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .site-card a {
            display: flex;
            align-items: center;
            padding: 15px;
            text-decoration: none;
            color: var(--text-color);
            border-left: 3px solid transparent;
            border-radius: 8px;
            transition: background-color 0.08s linear, color 0.08s linear;
            will-change: background-color, color;
        }

        .site-card .icon {
            width: 40px;
            height: 40px;
            margin-right: 15px;
            border-radius: 50%;
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .site-card .icon img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .site-card .info {
            flex: 1;
            min-width: 0;
        }

        .site-card .title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .site-card .desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Footer */
        .footer {
            margin-top: 50px;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #333;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
                width: 100%;
                max-width: 100vw;
                /* 为顶部固定按钮留出空间，防止内容被遮挡 */
                padding: 60px 15px 15px;
            }

            .mobile-toggle {
                display: block;
            }
        }

        .mobile-toggle {
            display: none;
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1001;
            background: var(--card-bg);
            border: none;
            color: var(--text-color);
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .mobile-toggle {
                display: block;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* TV Remote Navigation Focus Styles — lightweight for Android TV WebView */
        .tv-focused {
            outline: 3px solid #fff !important;
            outline-offset: -3px;
            box-shadow: inset 0 0 0 2px #fff;
            z-index: 10;
            position: relative;
            transform: none;
            transition: none !important;
            forced-color-adjust: none;
        }

        .sidebar-menu li a.tv-focused,
        .sidebar-menu li a.tv-focused:hover,
        .sidebar-menu li a.tv-focused:focus,
        .sidebar-menu li a.tv-focused:active {
            background-color: var(--hover-bg) !important;
            border-left-color: #fff !important;
            color: #fff !important;
            box-shadow: inset 0 0 0 2px #fff;
        }

        .site-card a.tv-focused,
        .site-card a.tv-focused:hover,
        .site-card a.tv-focused:focus,
        .site-card a.tv-focused:active {
            background-color: var(--hover-bg) !important;
            border-left-color: #fff !important;
            color: #fff !important;
        }

        .site-card a.tv-focused .desc,
        .site-card a.tv-focused .title,
        .sidebar-menu li a.tv-focused i,
        .sidebar-menu li a.tv-focused span {
            color: #fff !important;
        }

        body.tv-nav-active .sidebar-menu li a,
        body.tv-nav-active .site-card,
        body.tv-nav-active .site-card a,
        body.tv-nav-active .tv-focused {
            transition: none !important;
            animation: none !important;
            will-change: auto !important;
        }

        body.tv-nav-active .site-card,
        body.tv-nav-active .site-card:hover,
        body.tv-nav-active .site-card:focus-within {
            transform: none !important;
            box-shadow: none !important;
        }

        body.tv-nav-active .site-card a:not(.tv-focused),
        body.tv-nav-active .sidebar-menu li a:not(.tv-focused) {
            box-shadow: none !important;
        }

        /* Hide focus outline for mouse users */
        :focus:not(.tv-focused) {
            outline: none;
        }

        // ============================================================
        // TV Remote Navigation (UP/DOWN/LEFT/RIGHT/OK + mouse compat)
        // Spatial algorithm based on nfx native-dom-focus scoring.
        // ============================================================
        function initTvNavigation() {
            const NAV_KEYS = new Set(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter', 'NumpadEnter', 'Select', ' ', 'Spacebar']);
            let tvMode = false;
            let currentFocused = null;
            let lastToolbarHandoff = null;
            let lastToolbarHandoffAt = 0;
            let toolbarFocusActive = false;
            let activeSidebarLink = null;
            let pendingNavDir = null;
            let pendingNavFrame = 0;
            let sidebarRestoreFrame = 0;
            let sidebarRestoreTimer = 0;
            const itemCache = {
                all: null,
                category: null,
                site: null
            };

            // --- Element collection ---

            function getItems(zone) {
                var key = zone || 'all';
                if (itemCache[key]) return itemCache[key];
                var sel = zone ? 'a[data-zone="' + zone + '"]' : 'a[data-zone]';
                itemCache[key] = Array.from(document.querySelectorAll(sel)).filter(function (el) {
                    var r = getRect(el);
                    return r && r.width > 0 && r.height > 0;
                });
                return itemCache[key];
            }

            function invalidateItemCache() {
                itemCache.all = null;
                itemCache.category = null;
                itemCache.site = null;
            }

            // --- Geometry helpers ---

            function getRect(el) {
                if (!el) return null;
                try {
                    var r = el.getBoundingClientRect();
                    if (r.width < 1 || r.height < 1) return null;
                    return r;
                } catch (e) { return null; }
            }

            function getCenter(el) {
                var r = getRect(el);
                if (!r) return { x: 0, y: 0 };
                return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
            }

            // --- Focus management ---

            function clearFocus() {
                var el = currentFocused || document.querySelector('.tv-focused');
                if (el) {
                    el.classList.remove('tv-focused');
                }
                currentFocused = null;
            }

            function setTvNavActive(active) {
                if (!document.body) return;
                document.body.classList.toggle('tv-nav-active', !!active);
            }

            function suspendPageFocusForToolbar() {
                var el = currentFocused || document.querySelector('.tv-focused');
                if (el) {
                    el.classList.remove('tv-focused');
                }
                toolbarFocusActive = true;
            }

            function setFocus(el) {
                if (!el) return;
                toolbarFocusActive = false;
                if (currentFocused === el) {
                    if (!el.classList.contains('tv-focused')) {
                        el.classList.add('tv-focused');
                    }
                    scrollIntoViewCustom(el);
                    return;
                }
                var staleFocused = currentFocused || document.querySelector('.tv-focused');
                if (staleFocused && staleFocused !== el) {
                    staleFocused.classList.remove('tv-focused');
                }
                currentFocused = el;
                if (!el.classList.contains('tv-focused')) {
                    el.classList.add('tv-focused');
                }

                // Clear stale .active from sidebar items (prevents .active + .tv-focused dual-highlight)
                if (el.closest('.sidebar')) {
                    if (!activeSidebarLink || !document.documentElement.contains(activeSidebarLink)) {
                        activeSidebarLink = document.querySelector('#sidebar-menu a.active');
                    }
                    if (activeSidebarLink && activeSidebarLink !== el) {
                        activeSidebarLink.classList.remove('active');
                    }
                    activeSidebarLink = el.classList.contains('active') ? el : null;
                }

                scrollIntoViewCustom(el);
            }

            // Custom scroll: keep focused element in the "sweet zone" of the viewport.
            // - Navigating down: start scrolling when element passes 60% viewport height.
            // - Navigating up: start scrolling when element goes above 25% viewport height.
            // - Handles sidebar (own scroll container) vs main content (window scroll).
            function scrollIntoViewCustom(el) {
                var DOWN_RATIO = 0.60;
                var UP_RATIO = 0.25;
                var PADDING = 10; // px buffer to avoid edge-hugging

                // Determine scroll container
                var scrollParent = el.closest('.sidebar');
                var isSidebar = !!scrollParent;
                var container = isSidebar ? scrollParent : null; // null = window

                var elRect = el.getBoundingClientRect();
                var containerHeight, containerTop, scrollTop, scrollHeight;

                if (isSidebar) {
                    var cRect = container.getBoundingClientRect();
                    containerHeight = cRect.height;
                    containerTop = cRect.top;
                    scrollTop = container.scrollTop;
                    scrollHeight = container.scrollHeight;
                } else {
                    containerHeight = window.innerHeight;
                    containerTop = 0;
                    scrollTop = window.scrollY || document.documentElement.scrollTop;
                    scrollHeight = document.documentElement.scrollHeight;
                }

                // Element position relative to the scrollable container's content
                var elTopInContent = elRect.top - containerTop + scrollTop;
                var elBottomInContent = elTopInContent + elRect.height;

                // Visible zone boundaries in content coordinates
                var viewBottom = scrollTop + containerHeight;
                var viewTop = scrollTop;

                // Sweet zone thresholds (in content coordinates)
                var sweetBottom = scrollTop + containerHeight * DOWN_RATIO;
                var sweetTop = scrollTop + containerHeight * UP_RATIO;

                var newScrollTop = scrollTop;

                // Element extends below the sweet zone bottom → scroll down
                if (elBottomInContent + PADDING > sweetBottom) {
                    newScrollTop = elBottomInContent + PADDING - containerHeight * DOWN_RATIO;
                }
                // Element extends above the sweet zone top → scroll up
                else if (elTopInContent - PADDING < sweetTop) {
                    newScrollTop = elTopInContent - PADDING - containerHeight * UP_RATIO;
                }

                // Clamp
                var maxScroll = Math.max(0, scrollHeight - containerHeight);
                newScrollTop = Math.max(0, Math.min(newScrollTop, maxScroll));

                // Only scroll if actually changed
                if (Math.abs(newScrollTop - scrollTop) < 1) return;

                if (isSidebar) {
                    // Android System WebView can accept element.scrollTo({ behavior: 'smooth' })
                    // without actually scrolling fixed overflow containers. Use direct scrollTop
                    // for deterministic TV D-pad navigation.
                    applySidebarScroll(container, newScrollTop);
                } else {
                    window.scrollTo(0, newScrollTop);
                }
            }

            function applySidebarScroll(container, scrollTop) {
                container.scrollTop = scrollTop;
                if (Math.abs(container.scrollTop - scrollTop) > 2) {
                    try {
                        container.scrollTo(0, scrollTop);
                    } catch (e) {}
                }
                if (sidebarRestoreFrame) {
                    cancelAnimationFrame(sidebarRestoreFrame);
                    sidebarRestoreFrame = 0;
                }
                if (sidebarRestoreTimer) {
                    clearTimeout(sidebarRestoreTimer);
                    sidebarRestoreTimer = 0;
                }
                var restore = function() {
                    if (Math.abs(container.scrollTop - scrollTop) > 2) {
                        container.scrollTop = scrollTop;
                    }
                };
                try {
                    sidebarRestoreFrame = requestAnimationFrame(function() {
                        sidebarRestoreFrame = 0;
                        restore();
                    });
                    sidebarRestoreTimer = setTimeout(function() {
                        sidebarRestoreTimer = 0;
                        restore();
                    }, 80);
                } catch (e) {
                    sidebarRestoreTimer = setTimeout(function() {
                        sidebarRestoreTimer = 0;
                        restore();
                    }, 80);
                }
            }

            function getCurrentFocused() {
                if (currentFocused && document.documentElement.contains(currentFocused)) {
                    return currentFocused;
                }
                currentFocused = document.querySelector('.tv-focused');
                return currentFocused;
            }

            function routeKey() {
                return (location.pathname || '/freestreamingwebsites.html') +
                    (location.search || '') +
                    (location.hash || '');
            }

            function requestToolbarHandoff(el, reason) {
                if (!window.NaviSwitch || typeof window.NaviSwitch.requestNavBarFocus !== 'function') {
                    return false;
                }
                var now = Date.now();
                if (now - lastToolbarHandoffAt < 500) {
                    return true;
                }
                lastToolbarHandoffAt = now;
                var rect = getRect(el) || { left: window.innerWidth / 2, width: 0 };
                var centerX = rect.left + rect.width / 2;
                var handoffToken = 'fsw-' + Date.now().toString(36) + '-' +
                    Math.random().toString(36).slice(2, 8);
                var payload = {
                    site: 'free_streaming_websites',
                    handoffToken: handoffToken,
                    routeKey: routeKey(),
                    xRatio: Math.max(0, Math.min(1, centerX / Math.max(1, window.innerWidth))),
                    zone: reason || 'catalog-top',
                    timestamp: Date.now()
                };
                lastToolbarHandoff = payload;
                try {
                    window.NaviSwitch.requestNavBarFocus(JSON.stringify(payload));
                    return true;
                } catch (e) {
                    return false;
                }
            }

            function installPageNavigationBridge() {
                window.__TV_PAGE_NAV_BRIDGE__ = {
                    confirmToolbarHandoff: function(handoffToken, route) {
                        if (lastToolbarHandoff && lastToolbarHandoff.handoffToken !== handoffToken) {
                            return false;
                        }
                        lastToolbarHandoff = {
                            handoffToken: handoffToken,
                            routeKey: route || routeKey(),
                            timestamp: Date.now()
                        };
                        suspendPageFocusForToolbar();
                        return true;
                    },
                    restoreFromToolbar: function(handoffToken) {
                        if (lastToolbarHandoff && lastToolbarHandoff.handoffToken !== handoffToken) {
                            return false;
                        }
                        var target = getCurrentFocused() || getItems('category')[0] || getItems()[0];
                        if (!target) return false;
                        setFocus(target);
                        lastToolbarHandoff = null;
                        toolbarFocusActive = false;
                        return true;
                    },
                    clearSession: function() {
                        lastToolbarHandoff = null;
                        toolbarFocusActive = false;
                        return true;
                    }
                };
            }

            function isAtTopBoundary(current, dir, target) {
                if (dir !== 'UP' || target) return false;
                var zone = current.getAttribute('data-zone');
                if (zone === 'category') {
                    var sidebar = current.closest('.sidebar');
                    return !sidebar || sidebar.scrollTop <= 1;
                }
                return (window.scrollY || document.documentElement.scrollTop || 0) <= 1;
            }

            // --- Spatial scoring (from nfx scoreDirectionalCandidate) ---
            //
            // For UP/DOWN: primary axis is dy (weighted 8x), cross axis is dx.
            //   Bonus 0 when horizontal overlap > 0, penalty 2x when no overlap.
            // For LEFT/RIGHT: primary axis is dx (weighted 8x), cross axis is dy.
            //   Bonus 0 when vertical overlap > 0, penalty 2x when no overlap.
            // Candidates in the wrong direction get Infinity (filtered out).

            function overlap(aStart, aEnd, bStart, bEnd) {
                return Math.max(0, Math.min(aEnd, bEnd) - Math.max(aStart, bStart));
            }

            function scoreCandidate(curCenter, curRect, cCenter, cRect, dir) {
                var dx = cCenter.x - curCenter.x;
                var dy = cCenter.y - curCenter.y;
                var hOverlap = overlap(curRect.left, curRect.right, cRect.left, cRect.right);
                var vOverlap = overlap(curRect.top, curRect.bottom, cRect.top, cRect.bottom);
                var minAxis = 8;

                if (dir === 'UP') {
                    if (dy >= -minAxis) return Infinity;
                    return Math.abs(dy) * 8 + Math.abs(dx) + (hOverlap > 0 ? 0 : Math.abs(dx) * 2);
                }
                if (dir === 'DOWN') {
                    if (dy <= minAxis) return Infinity;
                    return Math.abs(dy) * 8 + Math.abs(dx) + (hOverlap > 0 ? 0 : Math.abs(dx) * 2);
                }
                if (dir === 'LEFT') {
                    if (dx >= -minAxis) return Infinity;
                    return Math.abs(dx) * 8 + Math.abs(dy) + (vOverlap > 0 ? 0 : Math.abs(dy) * 2);
                }
                if (dir === 'RIGHT') {
                    if (dx <= minAxis) return Infinity;
                    return Math.abs(dx) * 8 + Math.abs(dy) + (vOverlap > 0 ? 0 : Math.abs(dy) * 2);
                }
                return Infinity;
            }

            function findTarget(candidates, current, dir) {
                var curCenter = getCenter(current);
                var curRect = getRect(current);
                if (!curRect) return null;

                var best = null;
                var bestScore = Infinity;
                for (var i = 0; i < candidates.length; i++) {
                    var c = candidates[i];
                    if (c === current) continue;
                    var cRect = getRect(c);
                    if (!cRect) continue;
                    var s = scoreCandidate(curCenter, curRect, getCenter(c), cRect, dir);
                    if (s < bestScore) {
                        best = c;
                        bestScore = s;
                    }
                }
                return best;
            }

            function findByIndex(candidates, current, delta) {
                var index = candidates.indexOf(current);
                if (index < 0) return null;
                var next = index + delta;
                return next >= 0 && next < candidates.length ? candidates[next] : null;
            }

            // --- Directional navigation ---

            var DIR_MAP = { ArrowUp: 'UP', ArrowDown: 'DOWN', ArrowLeft: 'LEFT', ArrowRight: 'RIGHT' };

            function keyAction(e) {
                var key = e.key || '';
                var code = e.code || '';
                var keyCode = e.keyCode || e.which || 0;
                if (DIR_MAP[key]) return DIR_MAP[key];
                if (keyCode === 37) return 'LEFT';
                if (keyCode === 38) return 'UP';
                if (keyCode === 39) return 'RIGHT';
                if (keyCode === 40) return 'DOWN';
                if (
                    key === 'Enter' ||
                    key === 'NumpadEnter' ||
                    key === 'Select' ||
                    code === 'Enter' ||
                    code === 'NumpadEnter' ||
                    keyCode === 13 ||
                    keyCode === 23 ||
                    keyCode === 66
                ) {
                    return 'OK';
                }
                if (key === ' ' || key === 'Spacebar' || code === 'Space' || keyCode === 32) {
                    return 'OK';
                }
                return '';
            }

            function shouldHandleNavKey(e) {
                return !!keyAction(e);
            }

                return true;
            }

            function navigate(current, dir) {
                var zone = current.getAttribute('data-zone');
                var target = null;

                if (zone === 'category') {
                    if (dir === 'LEFT') return true; // Edge
                    if (dir === 'RIGHT') {
                        // Cross-zone: sidebar → grid
                        target = findTarget(getItems('site'), current, 'RIGHT');
                    } else {
                        // UP/DOWN: fixed sidebar order is cheaper and more stable than geometry scoring.
                        target = findByIndex(getItems('category'), current, dir === 'DOWN' ? 1 : -1);
                    }
                } else if (zone === 'site') {
                    if (dir === 'LEFT') {
                        // Try within grid first; if at left edge, cross-zone to sidebar
                        target = findTarget(getItems('site'), current, 'LEFT')
                              || findTarget(getItems('category'), current, 'LEFT');
                    } else if (dir === 'RIGHT') {
                        // Within grid only
                        target = findTarget(getItems('site'), current, 'RIGHT');
                    } else {
                        // UP/DOWN: within grid
                        target = findTarget(getItems('site'), current, dir);
                    }
                }

                if (target) {
                    setFocus(target);
                } else if (isAtTopBoundary(current, dir, target)) {
                    requestToolbarHandoff(current, 'catalog-top');
                }
                return true;
            }

            // --- Global keydown handler ---

            function runDirectionalNavigation(dir) {
                var current = getCurrentFocused();
                if (!current) {
                    var items = getItems('category');
                    if (items.length > 0) setFocus(items[0]);
                    return;
                }
                navigate(current, dir);
            }

            function scheduleDirectionalNavigation(dir) {
                pendingNavDir = dir;
                if (pendingNavFrame) return;
                pendingNavFrame = requestAnimationFrame(function() {
                    var nextDir = pendingNavDir;
                    pendingNavFrame = 0;
                    pendingNavDir = null;
                    if (nextDir) {
                        runDirectionalNavigation(nextDir);
                    }
                });
            }

            document.addEventListener('keydown', function (e) {
                if (!NAV_KEYS.has(e.key) && !shouldHandleNavKey(e)) return;
                e.preventDefault();
                e.stopPropagation();
                if (typeof e.stopImmediatePropagation === 'function') {
                    e.stopImmediatePropagation();
                }
                tvMode = true;
                setTvNavActive(true);

                var current = getCurrentFocused();
                var action = keyAction(e);
                var dir = action === 'OK' ? '' : action;

                if (toolbarFocusActive) {
                    return;
                }

                if (dir) {
                    if (e.repeat) {
                        scheduleDirectionalNavigation(dir);
                    } else {
                        runDirectionalNavigation(dir);
                    }
                    return;
                }

                if (!current) {
                    var items = getItems('category');
                    if (items.length > 0) setFocus(items[0]);
                    return;
                }

                if (action === 'OK') {
                    if (current.getAttribute('data-zone') === 'site') {
                        activateSiteLink(current);
                    } else {
                        current.click();
                    }
                }
            }, true);

            // Clear TV focus state on mouse interaction
            document.addEventListener('mousedown', function () {
                if (tvMode) {
                    tvMode = false;
                    setTvNavActive(false);
                    clearFocus();
                }
            });
            window.addEventListener('resize', invalidateItemCache);
            installPageNavigationBridge();
        }
    </script>
</body>
</html>
