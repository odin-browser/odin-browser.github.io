            generateSidebar();
            generateContent();
            if (__pageNavAware) {
                requestNativePageNavigationMode();
            }
            initTvNavigation();
        });

        // Tell the App to suspend its virtual cursor and route D-pad keys directly to this
        // page's DOM. Retried at 0/150/600 ms because injection timing can race with our DOM
        // readiness on older WebView builds. No-op in pre-update App builds (gated upstream
        // by __pageNavAware).
        function requestNativePageNavigationMode() {
            var payload = JSON.stringify({
                runtimeId: 'free_streaming_websites',
                state: 'mounted',
                host: location.hostname || 'odin-browser.github.io',
                createdAt: Date.now()
            });
            var requestMode = function() {
                try {
                    if (window.NaviSwitch && typeof window.NaviSwitch.setPageNavMode === 'function') {
                        window.NaviSwitch.setPageNavMode();
                    }
                } catch (e) {}
                try {
                    if (window.AndroidJSInterface && typeof window.AndroidJSInterface.postMessage === 'function') {
                        window.AndroidJSInterface.postMessage('watch_mode_state', payload);
                    }
                } catch (e) {}
            };
            requestMode();
            setTimeout(requestMode, 150);
            setTimeout(requestMode, 600);
        }

        // ============================================================
        // TV Remote Navigation (UP/DOWN/LEFT/RIGHT/OK + mouse compat)
        // Spatial algorithm based on nfx native-dom-focus scoring.
        // ============================================================
        function initTvNavigation() {
            const NAV_KEYS = new Set(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter', ' ']);
            let tvMode = false;

            // --- Element collection ---

            function getItems(zone) {
                var sel = zone
                    ? 'a[data-zone="' + zone + '"]'
                    : 'a[data-zone]';
                return Array.from(document.querySelectorAll(sel)).filter(function (el) {
                    var r = getRect(el);
                    return r && r.width > 0 && r.height > 0;
                });
            }

            // --- Geometry helpers ---

            function getRect(el) {
                if (!el) return null;
                try {
                    var r = el.getBoundingClientRect();
                    if (r.width < 1 || r.height < 1) return null;
                    return r;
                } catch (e) { return null; }
            }

            function getCenter(el) {
                var r = getRect(el);
                if (!r) return { x: 0, y: 0 };
                return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
            }

            // --- Focus management ---

            function clearFocus() {
                var el = document.querySelector('.tv-focused');
                if (el) el.classList.remove('tv-focused');
            }

            function setFocus(el) {
                if (!el) return;
                clearFocus();
                el.classList.add('tv-focused');
                try { el.focus({ preventScroll: true }); } catch (e) {}
                try { el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); } catch (e) {}
            }

            function getCurrentFocused() {
                return document.querySelector('.tv-focused');
            }

            // --- Spatial scoring (from nfx scoreDirectionalCandidate) ---
            //
            // For UP/DOWN: primary axis is dy (weighted 8x), cross axis is dx.
            //   Bonus 0 when horizontal overlap > 0, penalty 2x when no overlap.
            // For LEFT/RIGHT: primary axis is dx (weighted 8x), cross axis is dy.
            //   Bonus 0 when vertical overlap > 0, penalty 2x when no overlap.
            // Candidates in the wrong direction get Infinity (filtered out).

            function overlap(aStart, aEnd, bStart, bEnd) {
                return Math.max(0, Math.min(aEnd, bEnd) - Math.max(aStart, bStart));
            }

            function scoreCandidate(curCenter, curRect, cCenter, cRect, dir) {
                var dx = cCenter.x - curCenter.x;
                var dy = cCenter.y - curCenter.y;
                var hOverlap = overlap(curRect.left, curRect.right, cRect.left, cRect.right);
                var vOverlap = overlap(curRect.top, curRect.bottom, cRect.top, cRect.bottom);
                var minAxis = 8;

                if (dir === 'UP') {
                    if (dy >= -minAxis) return Infinity;
                    return Math.abs(dy) * 8 + Math.abs(dx) + (hOverlap > 0 ? 0 : Math.abs(dx) * 2);
                }
                if (dir === 'DOWN') {
                    if (dy <= minAxis) return Infinity;
                    return Math.abs(dy) * 8 + Math.abs(dx) + (hOverlap > 0 ? 0 : Math.abs(dx) * 2);
                }
                if (dir === 'LEFT') {
                    if (dx >= -minAxis) return Infinity;
                    return Math.abs(dx) * 8 + Math.abs(dy) + (vOverlap > 0 ? 0 : Math.abs(dy) * 2);
                }
                if (dir === 'RIGHT') {
                    if (dx <= minAxis) return Infinity;
                    return Math.abs(dx) * 8 + Math.abs(dy) + (vOverlap > 0 ? 0 : Math.abs(dy) * 2);
                }
                return Infinity;
            }

            function findTarget(candidates, current, dir) {
                var curCenter = getCenter(current);
                var curRect = getRect(current);
                if (!curRect) return null;

                var scored = [];
                for (var i = 0; i < candidates.length; i++) {
                    var c = candidates[i];
                    if (c === current) continue;
                    var cRect = getRect(c);
                    if (!cRect) continue;
                    var s = scoreCandidate(curCenter, curRect, getCenter(c), cRect, dir);
                    if (s < Infinity) scored.push({ el: c, score: s });
                }
                scored.sort(function (a, b) { return a.score - b.score; });
                return scored.length > 0 ? scored[0].el : null;
            }

            // --- Directional navigation ---

            var DIR_MAP = { ArrowUp: 'UP', ArrowDown: 'DOWN', ArrowLeft: 'LEFT', ArrowRight: 'RIGHT' };

            function navigate(current, dir) {
                var zone = current.getAttribute('data-zone');
                var target = null;

                if (zone === 'category') {
                    if (dir === 'LEFT') return true; // Edge
                    if (dir === 'RIGHT') {
                        // Cross-zone: sidebar ‚Üí grid
                        target = findTarget(getItems('site'), current, 'RIGHT');
                    } else {
                        // UP/DOWN: within sidebar
                        target = findTarget(getItems('category'), current, dir);
                    }
                } else if (zone === 'site') {
                    if (dir === 'LEFT') {
                        // Try within grid first; if at left edge, cross-zone to sidebar
                        target = findTarget(getItems('site'), current, 'LEFT')
                              || findTarget(getItems('category'), current, 'LEFT');
                    } else if (dir === 'RIGHT') {
                        // Within grid only
                        target = findTarget(getItems('site'), current, 'RIGHT');
                    } else {
                        // UP/DOWN: within grid
                        target = findTarget(getItems('site'), current, dir);
                    }
                }

                if (target) {
                    setFocus(target);
                } else if (__pageNavAware && dir === 'UP') {
                    // No UP candidate found ‚Üí we're at the top edge. Ask the App's toolbar
                    // to take focus (PAGE_NAV_EDGE handoff). App calls back via
                    // window.__TV_PAGE_NAV_BRIDGE__.restoreFromToolbar(token, route) when
                    // the user returns from the toolbar.
                    requestToolbarHandoff(current);
                }
                return true;
            }

            // --- Toolbar handoff (aware-only) ---
            var lastToolbarHandoffAt = 0;
            function requestToolbarHandoff(currentEl) {
                if (!__pageNavAware) return;
                if (!window.NaviSwitch || typeof window.NaviSwitch.requestNavBarFocus !== 'function') return;
                // Debounce: TV remotes often double-fire UP at edges.
                var now = Date.now();
                if (now - lastToolbarHandoffAt < 500) return;
                lastToolbarHandoffAt = now;
                var rect = getRect(currentEl) || { left: window.innerWidth / 2, width: 0 };
                var centerX = rect.left + rect.width / 2;
                var payload = {
                    site: 'free_streaming_websites',
                    handoffToken: 'fsw-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8),
                    routeKey: (location.pathname || '') + (location.search || '') + (location.hash || ''),
                    xRatio: Math.max(0, Math.min(1, centerX / Math.max(1, window.innerWidth))),
                    zone: 'catalog-top',
                    timestamp: now
                };
                try { window.NaviSwitch.requestNavBarFocus(JSON.stringify(payload)); } catch (e) {}
            }

            // Bridge object the App invokes after toolbar BACK / browser-chrome dismissal
            // to restore page focus. Only exposed in aware builds so legacy App users see
            // no behavioral change.
            if (__pageNavAware) {
                window.__TV_PAGE_NAV_BRIDGE__ = {
                    restoreFromToolbar: function(handoffToken, routeKey) {
                        var target = getCurrentFocused() || getItems('category')[0] || getItems()[0];
                        if (!target) return false;
                        setFocus(target);
                        return true;
                    },
                    restoreAfterBrowserChrome: function(reason) {
                        var target = getCurrentFocused() || getItems('category')[0] || getItems()[0];
                        if (!target) return false;
                        setFocus(target);
                        return true;
                    },
                    clearSession: function() { return true; }
                };
            }

            // --- Global keydown handler ---

            document.addEventListener('keydown', function (e) {
                if (!NAV_KEYS.has(e.key)) return;
                tvMode = true;

                var current = getCurrentFocused();
                var dir = DIR_MAP[e.key];

                if (!current) {
                    var items = getItems('category');
                    if (items.length > 0) setFocus(items[0]);
                    e.preventDefault();
                    return;
                }

                if (dir) {
                    navigate(current, dir);
                    e.preventDefault();
                    e.stopPropagation();
                } else if (e.key === 'Enter' || e.key === ' ') {
                    if (current.getAttribute('data-zone') === 'site') {
                        if (__pageNavAware) {
                            // Same-tab navigation: BACK returns to the catalog cleanly on TV.
                            try { window.location.assign(current.href); }
                            catch (err) { window.location.href = current.href; }
                        } else {
                            window.open(current.href, '_blank', 'noopener');
                        }
                    } else {
                        current.click();
                    }
                    e.preventDefault();
                    e.stopPropagation();
                }
            }, true);

            // Clear TV focus state on mouse interaction
            document.addEventListener('mousedown', function () {
                if (tvMode) {
                    tvMode = false;
                    clearFocus();
                }
            });
        }
    </script>
</body>
</html>
